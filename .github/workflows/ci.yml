name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions: {}

jobs:
  ci:
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        runner:
          - macos-latest
          - ubuntu-24.04-arm
          - ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up unnix
        uses: ./

      - run: actionlint

      - run: shellcheck setup.sh

      - run: shfmt -d setup.sh

      - run: typos

      - run: zizmor .
